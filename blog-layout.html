---
layout: default
---

<article class="blog-post-page">
  <div class="blog-post-container">

    <div class="blog-post-header">
      <a class="back-link" href="{{ '/' | relative_url }}#blogs">&larr; Back to Blog</a>
      <div class="blog-post-meta">
        <span class="blog-date">{{ page.date | date: "%B %d, %Y" }}</span>
        {% if page.tag %}
        <span class="blog-tag">{{ page.tag }}</span>
        {% endif %}
      </div>
      <h1 class="blog-post-title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="blog-post-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>

    <div class="blog-post-body">
      {{ content }}
    </div>

    <div class="blog-post-footer">
      <a class="back-link" href="{{ '/' | relative_url }}#blogs">&larr; Back to Blog</a>
    </div>

  </div>
</article>

<style>
  .blog-post-page {
    padding: 60px 20px;
    min-height: 80vh;
  }

  .blog-post-container {
    max-width: 720px;
    margin: 0 auto;
  }

  .back-link {
    display: inline-block;
    color: var(--link, #4a76ee);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 32px;
  }

  .back-link:hover {
    text-decoration: underline;
  }

  .blog-post-header {
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border, #ddd);
    padding-bottom: 32px;
  }

  .blog-post-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    margin-top: 16px;
  }

  .blog-date {
    font-size: 0.85rem;
    color: #999;
  }

  .blog-tag {
    font-size: 0.75rem;
    background-color: var(--light_background, #f3f5fb);
    color: var(--link, #4a76ee);
    border: 1px solid var(--border, #ddd);
    padding: 2px 10px;
    border-radius: 99px;
    font-weight: 500;
  }

  .blog-post-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text, #1a1c20);
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .blog-post-subtitle {
    font-size: 1.1rem;
    color: #666;
    line-height: 1.6;
  }

  .blog-post-body {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--text, #1a1c20);
  }

  .blog-post-body h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 48px;
    margin-bottom: 16px;
    color: var(--text, #1a1c20);
  }

  .blog-post-body h3 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-top: 32px;
    margin-bottom: 12px;
  }

  .blog-post-body p {
    margin-bottom: 20px;
  }

  .blog-post-body blockquote {
    border-left: 4px solid var(--highlight, #0c0cf2);
    padding-left: 20px;
    margin: 32px 0;
    font-style: italic;
    color: #555;
  }

  .blog-post-footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border, #ddd);
  }

  @media (max-width: 600px) {
    .blog-post-title {
      font-size: 1.6rem;
    }
  }
</style>
